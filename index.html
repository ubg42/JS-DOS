<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oregon Trail 1990 - DOSBox</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #dosbox {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="dosbox"></div>

<!-- DOSBox build -->
<script src="js-dos-api.js"></script>

<script>
let dosbox;

window.onload = () => {
    dosbox = new Dosbox({
        id: "dosbox",
        onload: function (dosbox) {
            dosbox.run(
                "Oregon_The_1990.zip",
                "OREGON.EXE"
            );
        },
        onrun: function (dosbox, app) {
            console.log("Running:", app);
        }
    });
};
</script>

</body>
</html>
