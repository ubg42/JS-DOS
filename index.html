<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oregon Trail (1990)</title>

<script src="https://v8.js-dos.com/latest/js-dos.js"></script>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: sans-serif;
}

#dos {
    width: 100vw;
    height: 100vh;
}

#overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    color: white;
}

button {
    font-size: 22px;
    padding: 12px 24px;
    cursor: pointer;
    border: none;
    background: #2ecc71;
    color: white;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="dos"></div>

<div id="overlay">
    <h1>Loading Emulator...</h1>
    <p id="status">Please wait...</p>
    <button id="startBtn" disabled>Start Game</button>
</div>

<script>
let ci = null;
let ready = false;

const startBtn = document.getElementById("startBtn");
const statusText = document.getElementById("status");

// Load JS-DOS FIRST
Dos(document.getElementById("dos"), {
    url: "https://archive.org/download/oregon-the-1990/Oregon_The_1990.zip",
    autoStart: true
}).then((instance) => {

    ci = instance;
    ready = true;

    statusText.innerText = "Ready!";
    startBtn.disabled = false;
});

// Button ONLY runs after ready
startBtn.onclick = () => {
    if (!ready || !ci) return;

    document.getElementById("overlay").style.display = "none";

    setTimeout(() => {
        ci.fullscreen?.();
        ci.run("OREGON.EXE");
    }, 500);
};
</script>

</body>
</html>
