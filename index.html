<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oregon Trail (1990)</title>

<script src="https://v8.js-dos.com/latest/js-dos.js"></script>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: sans-serif;
}

#dos {
    width: 100vw;
    height: 100vh;
}

/* Archive.org-style overlay */
#overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    color: white;
}

button {
    font-size: 22px;
    padding: 12px 24px;
    cursor: pointer;
    border: none;
    background: #2ecc71;
    color: white;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="dos"></div>

<div id="overlay">
    <h1>The Oregon Trail (1990)</h1>
    <button onclick="startGame()">Start Game</button>
</div>

<script>
let ci;

// Boot DOS (but don't run game yet)
Dos(document.getElementById("dos"), {
    url: "https://archive.org/download/oregon-the-1990/Oregon_The_1990.zip",
    autoStart: false
}).then((instance) => {
    ci = instance;
});

function startGame() {
    document.getElementById("overlay").style.display = "none";

    setTimeout(() => {
        ci.fullscreen?.();

        // THIS is the clean Archive-style way:
        // directly run the executable (no typing simulation)
        ci.run("OREGON.EXE");

    }, 1500);
}
</script>

</body>
</html>
