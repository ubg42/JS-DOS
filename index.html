<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oregon Trail 1990 - JS-DOS</title>

    <script src="js-dos.js"></script>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #dos {
            width: 100vw;
            height: 100vh;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.6);
            z-index: 10;
        }

        button {
            font-size: 24px;
            padding: 15px 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="dos"></div>

<div id="overlay">
    <button onclick="startGame()">Start Game</button>
</div>

<script>
let ci;

Dos(document.getElementById("dos"), {
    url: "Oregon_The_1990.zip",
}).then((instance) => {
    ci = instance;
});

function startGame() {
    document.getElementById("overlay").style.display = "none";

    setTimeout(() => {
        ci.fullscreen?.();

        // "Type" OREGON.EXE and run it
        const command = "OREGON.EXE\r";
        ci.commandInterface.sendKeys(command);

    }, 2000);
}
</script>

</body>
</html>
