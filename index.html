<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oregon Trail 1990 - DOSBox</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #dosbox {
            width: 100vw;
            height: 100vh;
        }

        #startBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<button id="startBtn">Start Game</button>
<div id="dosbox"></div>

<!-- DOSBox build -->
<script src="js-dos-api.js"></script>

<script>
let dosbox;

document.getElementById("startBtn").onclick = async () => {
    document.getElementById("startBtn").style.display = "none";

    dosbox = new Dosbox({
        id: "dosbox",
        onload: function (dosbox) {

            dosbox.run(
                "Oregon_The_1990.zip",
                "OREGON.EXE"
            );

        },
        onrun: function (dosbox, app) {
            console.log("Running:", app);
        }
    });
};
</script>

</body>
</html>
