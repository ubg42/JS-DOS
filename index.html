<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oregon Trail 1990 - JS-DOS</title>

    <script src="js-dos.js"></script>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #dos {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="dos"></div>

<script>
Dos(document.getElementById("dos"), {
    url: "Oregon_The_1990.zip",
}).then((ci) => {

    // wait for DOS boot
    setTimeout(() => {
        ci.fullscreen?.();
        ci.run("OREGON.EXE"); // main game file
    }, 3000);

});
</script>

</body>
</html>
